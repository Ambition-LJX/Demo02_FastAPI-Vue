name: Build and Push Docker Images

on:
  push:
    branches:
      - main        # 只在 main 分支推送时触发
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io                           # GitHub Container Registry
  IMAGE_BACKEND: demo02-backend
  IMAGE_FRONTEND: demo02-frontend

  # 完整镜像路径（含小写用户名，Docker 仓库名不能有大写）
  IMAGE_BACKEND_FULL: ghcr.io/${{ lower(github.repository_owner) }}/demo02-backend
  IMAGE_FRONTEND_FULL: ghcr.io/${{ lower(github.repository_owner) }}/demo02-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write   # 需要这个权限才能推送到 ghcr.io
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多平台构建支持）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND_FULL }}:latest
            ${{ env.IMAGE_BACKEND_FULL }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND_FULL }}:latest
            ${{ env.IMAGE_FRONTEND_FULL }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 通知部署（可选：Webhook/钉钉/飞书）
        if: success()
        run: |
          echo "✅ 镜像构建并推送成功！"
          echo "后端: ${{ env.IMAGE_BACKEND_FULL }}:latest"
          echo "前端: ${{ env.IMAGE_FRONTEND_FULL }}:latest"
