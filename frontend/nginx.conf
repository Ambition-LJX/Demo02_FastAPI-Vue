server {
    listen 80;
    server_name localhost;

    # 网站根目录，就是从构建阶段拷进来的 Vue 打包产物
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由兜底：SPA 单页应用刷新任意路径都返回 index.html，
    # 避免刷新页面出现 404。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理：凡是 /api 开头的请求，转发给后端容器。
    # 这里的 backend 是 docker-compose 里后端服务的名字，
    # Docker 内置 DNS 会把它解析成后端容器的内网 IP。
    # resolver 127.0.0.11 是 Docker 内置 DNS 地址（只在容器内有效）
    #
    # 重要：用变量 $backend 做 proxy_pass，nginx 会在运行时解析而非启动时解析。
    # 这样即使后端容器还没就绪，nginx 也能正常启动，请求时再尝试连接。
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend "backend:8000";
        proxy_pass http://$backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
